services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fam-finance-api
    ports:
      - "3010:3010"
    env_file:
      - .env.example
    environment:
      PORT: "3010"
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://localhost:3010/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
